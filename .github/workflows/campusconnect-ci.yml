name: CampusConnect CI

on:
  push:
    branches:
      - main

jobs:

  test:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Frontend
        run: |
          cd Frontend
          npm install
          npm test -- --watchAll=false

      - name: Backend
        run: |
          cd Backend
          npm install
          npm test